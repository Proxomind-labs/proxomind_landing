<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Icon - Abstract Brain/Network Symbol -->
  <g transform="translate(0, 5)">
    <!-- Main circle -->
    <circle cx="22" cy="22" r="18" fill="url(#iconGradient)" opacity="0.15"/>
    
    <!-- Neural network nodes -->
    <circle cx="22" cy="10" r="4" fill="url(#iconGradient)"/>
    <circle cx="12" cy="18" r="3" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="32" cy="18" r="3" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="16" cy="32" r="3" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="28" cy="32" r="3" fill="url(#iconGradient)" opacity="0.8"/>
    <circle cx="22" cy="22" r="5" fill="url(#iconGradient)"/>
    
    <!-- Connections -->
    <line x1="22" y1="10" x2="22" y2="17" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="18" x2="17" y2="20" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="32" y1="18" x2="27" y2="20" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="16" y1="32" x2="19" y2="26" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="28" y1="32" x2="25" y2="26" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="18" x2="22" y2="22" stroke="url(#iconGradient)" stroke-width="1" opacity="0.4"/>
    <line x1="32" y1="18" x2="22" y2="22" stroke="url(#iconGradient)" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Text: Proxo -->
  <text x="55" y="33" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    Proxo
  </text>
  
  <!-- Text: Mind (gradient) -->
  <text x="125" y="33" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="26" font-weight="700" fill="url(#logoGradient)" letter-spacing="-0.5">
    Mind
  </text>
</svg>