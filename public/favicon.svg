<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Proxomind Labs favicon">
  <rect width="128" height="128" rx="30" fill="#050506"/>
  <defs>
    <linearGradient id="r" x1="20" y1="18" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#ff3333"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="10" y="10" width="108" height="108" rx="24" fill="none" stroke="#ff3333" stroke-opacity="0.42" stroke-width="3"/>
  <text x="25" y="82" fill="url(#r)" filter="url(#glow)" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" letter-spacing="-5">PM</text>
</svg>
